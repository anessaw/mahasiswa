<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>

    <div class="container mt-5">
    <h2 class="text-center mb-4">Data Mata Kuliah</h2>

    <!-- FORM -->
    <div class="card p-4 mb-4 shadow-sm">
        <form id="formMatkul">
            <div class="card p-3">
    <h5>Tambah / Edit Data</h5>
            <div class="row">
                <input type="hidden" id="id">

                <div class="col-md-2 mb-2">
                    <input type="text" id="nama" class="form-control" placeholder="Nama Matakuliah" required>
                </div>

                <div class="col-md-2 mb-2">
                    <input type="text" id="kode" class="form-control" placeholder="Kode Matakuliah" required>
                </div>

                <div class="col-md-2 mb-2">
                    <input type="text" id="sks" class="form-control" placeholder="SKS Matakuliah" required>
                </div>

                <div class="col-md-2 mb-2">
                    <input type="text" id="jadwal" class="form-control" placeholder="Jadwal Matakuliah" required>
                </div>

<div class="col-md-2 mb-2">
    <input type="time" id="jam" class="form-control" required>
</div>
                <div class="col-md-2 mb-2">
                    <button type="submit" class="btn btn-primary w-100">Simpan</button>
                </div>
            </div>
        </form>
    </div>

    <!-- TABEL -->
    <div class="card p-4 shadow-sm">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <th>Id</th>
                    <th>Nama</th>
                    <th>Kode</th>
                    <th>SKS</th>
                    <th>Jadwal</th>
                    <th>Jam</th>
                    <th>Aksi</th>
            </thead>
            <tbody id="tabelBody"></tbody>
        </table>
    </div>
</div>

<script src="./matkul.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
