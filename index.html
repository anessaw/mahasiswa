<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Sederhana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

    <div class="container mt-5">
    <h2 class="text-center mb-4">Data Mahasiswa</h2>

    <!-- FORM -->
    <div class="card p-4 mb-4 shadow-sm">
        <form id="formMahasiswa">
            <div class="row">
                <input type="hidden" id="id">

                <div class="col-md-4 mb-2">
                    <input type="text" id="nama" class="form-control" placeholder="Nama Mahasiswa" required>
                </div>

                <div class="col-md-3 mb-2">
                    <input type="text" id="nim" class="form-control" placeholder="NIM Mahasiswa" required>
                </div>

                <div class="col-md-3 mb-2">
                    <input type="text" id="fakultas" class="form-control" placeholder="Fakultas Mahasiswa" required>
                </div>

                <div class="col-md-2 mb-2">
                    <button type="submit" class="btn btn-primary w-100">Simpan</button>
                </div>
            </div>
        </form>
    </div>

    <!-- TABEL -->
    <div class="card p-4 shadow-sm">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nama</th>
                    <th>NIM</th>
                    <th>Fakultas</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelBody"></tbody>
        </table>
    </div>
</div>

<script src="./mahasiswa.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
