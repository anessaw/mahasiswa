<body class="bg-light">

    <div class="container mt-5">
    <h2 class="text-center mb-4">Data Dosen</h2>

    <!-- FORM -->
    <div class="card p-4 mb-4 shadow-sm">
        <form id="formDosen">
              <div class="card p-4 shadow-sm mb-4">
    <h5>Tambah / Edit Data</h5>
            <div class="row">
                <input type="hidden" id="id">

                <div class="col-md-3 mb-2">
                    <input type="text" id="nama" class="form-control" placeholder="Nama Dosen" required>
                </div>

                <div class="col-md-2 mb-2">
                    <input type="text" id="nidn" class="form-control" placeholder="NIDN Dosen" required>
                </div>

                <div class="col-md-2 mb-2">
                    <input type="text" id="prodi" class="form-control" placeholder="Prodi Dosen" required>
                </div>

                <div class="col-md-3 mb-2">
                    <input type="text" id="fakultas" class="form-control" placeholder="Fakultas Dosen" required>
                </div>

                <div class="col-md-2 mb-2">
                    <button type="submit" class="btn btn-primary w-100">Simpan</button>
                </div>
            </div>
        </form>
    </div>

    <!-- TABEL -->
    <div class="card p-4 shadow-sm">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nama</th>
                    <th>NIDN</th>
                    <th>Prodi</th>
                    <th>Fakultas</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelBody"></tbody>
        </table>
    </div>
</div>

<script src="./dosen.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
